{% extends "gabari.html"%}
{% block content %}
<div class="signup-container">
  <h1>Sign Up</h1>
  <form method = "POST">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Créer mon compte"></input>
  </form>
  <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #888;">Deja un compte ? → <a href="{% url 'login_view' %}" style="color: white; text-decoration: none; font-weight: bold;">Connectez-vous !</a></p>
</div>
{% endblock%}
