{% load static %}
<!DOCTYPE html>
<html lang="fr"  data-bs-theme="dark">
<head>
    <meta name="color-scheme" content="light dark" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static "/css/style.css" %}?v=1"rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>
    {% block title %}
        Accueil
    {% endblock %}
    </title>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MonSite</div>
        <div class="nav-links">
        <a href="{% url 'acceuil' %}">Accueil</a>
        <a href="{% url 'author' %}">Auteur</a>
        <a href="{% url 'book' %}">Livre</a>
        <a href="{% url 'publisher' %}">Editeur</a>
        {% if user.is_authenticated %}
            <form method="POST" action ="{% url 'logout_view' %}" style="display: inline;">
                {% csrf_token %}
                <button class="nav-btn">Se deconnecter</button>
            </form>
        {% else %}
            <a href="{% url 'login_view' %}" class="nav-btn">
                Se Connecter 
            </a>
        {% endif %}
        </div>
        <div class="user-profile">
            {% if user.is_authenticated  %} 
                {{user.username}}
            {% endif %}
        </div>
    </nav>
    {% block content %}

    {% endblock %}
</body></html>
