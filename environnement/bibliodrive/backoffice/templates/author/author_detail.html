{% extends "gabari.html" %}
{% block content %}
<div class="author-detail-wrapper">
    <h1 class="author-name">{{author.name}}</h1>
    <p class="author-birth-year">Année de Naissance : {{author.year_born}}</p>
    
    <div class="author-books-grid">
        {% for b in books %}
            <a href="{% url 'book_detail' book_id=b.isbn %}" class="book-item-link">
                {{b.title}}
            </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
